{% extends 'core/base.html' %}
{% block content %}
<div class="card">
    <h3>{{ title }}</h3>
    <form method="post">
        {% csrf_token %}
        {% for field in form %}
        <div class="form-group">
            <label>{{ field.label }}</label>
            {{ field }}
            {% if field.errors %}<div style="color:red;">{{ field.errors }}</div>{% endif %}
        </div>
        {% endfor %}
        <button class="btn" type="submit">保存</button>
    </form>
</div>
{% endblock %}
