{% extends 'core/base.html' %}
{% block content %}
<div class="card">
    <h3>系统通知</h3>
    <table>
        <tr><th>时间</th><th>标题</th><th>类型</th><th>内容</th></tr>
        {% for item in items %}
        <tr>
            <td>{{ item.created_at|date:"Y-m-d H:i" }}</td>
            <td>{{ item.title }}</td>
            <td>{{ item.get_notification_type_display }}</td>
            <td>{{ item.content }}</td>
        </tr>
        {% empty %}
        <tr><td colspan="4">暂无通知</td></tr>
        {% endfor %}
    </table>
</div>
{% endblock %}
